# Conectar al stack CFRD (Traefik + Postgres + Redis en microservicios_service_net).
# Desde la raíz del repo: docker compose -f deploy/cfrd-stack/docker-compose.yml --env-file .env up -d --build

name: pddp

services:
  pddp:
    build:
      context: ../../ContenedorPrevencionDelitoPreviewH5P/apache
      dockerfile: Dockerfile
    container_name: cfrd-pddp-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      USE_VITE_BUILD: "0"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CLIENT: phpredis
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
    volumes:
      - ../../:/var/www/html
    # Necesario para que el contenedor pueda llamar a LMS detrás de Traefik usando los mismos hostnames.
    extra_hosts:
      - "moodlejames.cfrd.cl:host-gateway"
      - "canvasjames.cfrd.cl:host-gateway"
      - "lrslocal.cfrd.cl:host-gateway"
    labels:
      - traefik.enable=true
      - traefik.docker.network=${CFRD_STACK_NETWORK:-microservicios_service_net}
      - 'traefik.http.routers.pddp-secure.rule=${PDDP_TRAEFIK_RULE:-Host(`pddp.cfrd.cl`)}'
      - traefik.http.routers.pddp-secure.entrypoints=websecure
      - traefik.http.routers.pddp-secure.tls=true
      - traefik.http.routers.pddp-secure.service=pddp
      - traefik.http.services.pddp.loadbalancer.server.port=80
      - 'traefik.http.routers.pddp-http.rule=${PDDP_TRAEFIK_RULE:-Host(`pddp.cfrd.cl`)}'
      - traefik.http.routers.pddp-http.entrypoints=web
      - traefik.http.routers.pddp-http.middlewares=pddp-redirect-https
      - traefik.http.middlewares.pddp-redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.pddp-redirect-https.redirectscheme.permanent=true
    networks:
      - cfrd_stack

  pddp-queue:
    profiles:
      - queue
    build:
      context: ../../ContenedorPrevencionDelitoPreviewH5P/apache
      dockerfile: Dockerfile
    container_name: cfrd-pddp-queue
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CLIENT: phpredis
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - ../../:/var/www/html
    extra_hosts:
      - "moodlejames.cfrd.cl:host-gateway"
      - "canvasjames.cfrd.cl:host-gateway"
      - "lrslocal.cfrd.cl:host-gateway"
    networks:
      - cfrd_stack

networks:
  cfrd_stack:
    external: true
    name: ${CFRD_STACK_NETWORK:-microservicios_service_net}
